<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auslastung – Stundencheck</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Stunden<span>check</span></a>
    <nav>
      <a href="index.html"       class="nav-link">Übersicht</a>
      <a href="clients.html"     class="nav-link">Kunden</a>
      <a href="employees.html"   class="nav-link">Mitarbeiter</a>
      <a href="utilization.html" class="nav-link active">Auslastung</a>
      <a href="settings.html"    class="nav-link">Einstellungen</a>
    </nav>
  </div>
</header>

<main class="main">

  <div id="setupHint" class="hidden">
    <div class="state-box">
      <div class="icon">⚙️</div>
      <h3>Einstellungen erforderlich</h3>
      <p>Bitte zuerst die Supabase-Verbindung in den <a href="settings.html">Einstellungen</a> konfigurieren.</p>
      <a href="settings.html" class="btn btn-primary">Zu den Einstellungen</a>
    </div>
  </div>

  <div id="error"></div>

  <div class="page-header">
    <div>
      <h1>Mitarbeiterauslastung</h1>
      <div class="sub">Gebuchte Stunden vs. verfügbare Arbeitszeit · 40h-Woche (Mo–Fr)</div>
    </div>
    <div class="filters">
      <div class="filter-group">
        <label for="internalPct">Interne Stunden</label>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="number" id="internalPct" min="0" max="100" step="1" style="width:64px" placeholder="0">
          <span style="font-size:13px;color:var(--text-muted)">%</span>
        </div>
      </div>
      <div class="filter-group" style="align-items:center;gap:6px">
        <input type="checkbox" id="deductHolidays" style="accent-color:var(--primary);width:auto">
        <label for="deductHolidays" style="cursor:pointer;white-space:nowrap">Feiertage abziehen</label>
      </div>
      <div class="filter-group">
        <label for="yearSelect">Jahr</label>
        <select id="yearSelect" style="width:82px"></select>
      </div>
      <button id="loadBtn" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Laden
      </button>
    </div>
  </div>

  <div id="infoBar" class="hidden" style="margin-bottom:16px"></div>
  <div id="loading"></div>
  <div id="tableWrap" class="card hidden" style="overflow-x:auto"></div>
  <div id="holidayInfo" class="hidden" style="margin-top:20px"></div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/utilization.js?v=2"></script>
</body>
</html>
