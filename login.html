<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden – Stundencheck</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">Stunden<span>check</span></div>
    <p class="login-subtitle">Adsmasters · Internes Tool</p>

    <div id="loginError" class="alert alert-danger hidden" style="margin-bottom:18px"></div>

    <div class="field" style="margin-bottom:14px">
      <label for="loginEmail">E-Mail</label>
      <input type="email" id="loginEmail" placeholder="name@adsmasters.de" autocomplete="email">
    </div>
    <div class="field" style="margin-bottom:22px">
      <label for="loginPassword">Passwort</label>
      <input type="password" id="loginPassword" autocomplete="current-password">
    </div>
    <button id="loginBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">
      Anmelden
    </button>

    <p style="margin-top:18px;text-align:center;font-size:12px;color:var(--text-muted)">
      Kein Konto? Wende dich an den Admin.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script src="js/login.js"></script>
</body>
</html>
